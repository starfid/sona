<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Sona</title>
		<link rel="icon" href="data:,">
		<meta content="Starfid Sona" name="description">
		<meta content="notranslate" name="google">
		<meta content="yes" name="mobile-web-app-capable">
		<meta content="yes" name="apple-mobile-web-app-capable">
		<meta content="default" name="apple-mobile-web-app-status-bar-style">
		<meta content="#FFFFFF" name="theme-color" media="(prefers-color-scheme: light)">
		<meta content="#1E1E1E" name="theme-color" media="(prefers-color-scheme: dark)">
		<meta content="width=device-width,initial-scale=1,maximum-scale=1,shrink-to-fit=no,user-scalable=0,viewport-fit=cover" name="viewport">
		<style>
			:root {
				--bg:#FFFFFF;	--fn2:1.7vw;	--brC:#FAF9F7;
				--mg:.7vw;	--fn1:1.2vw;	--mg2:calc(var(--fn2) / 2)
			}
			body {background-color:var(--bg); font-family:Arial; font-size:var(--fn1)}
			body, fieldset, form, form input {margin:0; padding:0}
			svg {cursor:pointer}
			main {display:grid; grid-template-columns:22% auto 39%;}
			section {position:relative; height:100vh; overflow:hidden;}
			section:nth-child(2) {border-left:1px solid var(--brC); border-right:1px solid var(--brC)}
			fieldset {
				position:absolute; top:0; left:0; right:0; xbackground:magenta; z-index:1;
				border:0; xborder-bottom:1px solid black; display:grid; grid-template-columns:50% 50%
			}
			fieldset div:not(:first-child) {text-align:right;}
			fieldset > h2, fieldset > div {font-size:var(--fn2); font-weight:bolder}
			fieldset > h2 {padding:0;margin:var(--mg) var(--mg) var(--mg) calc(var(--mg) + (var(--fn2) / 2))}
			fieldset > div {margin:var(--mg);}
			section > div {margin:0 var(--mg) 0 var(--mg);}
			section > div {
				position:absolute; top:0; left:0; right:0; bottom:0; overflow-y:auto;
				scrollbar-width:none; padding-top: calc(((3 * var(--mg)) + var(--fn2)) * .91);
			}
			svg:first-child {margin-left:var(--mg2)}
			svg:last-child {margin-right:var(--mg2)}
			svg {
				width:calc(var(--fn2)); height:100%; stroke-width:4; stroke:#000;fill:transparent;
				margin: 0 0 0 var(--mg2);
			}
			#listSide, #backDiv, #navField {display:none}
			#detailDiv {text-align:left}
			.listView input[type='radio'] {transform: scale(0.1);appearance: none;opacity: 0;display:block}
			.listView label {
				display:block;cursor:pointer;
				height:7vh; padding:2vh; border-radius:1vh
			}
			.listView input[type="radio"]:checked + label {background:#0069DB;color:#F8FBFE}

			@media screen and (max-width: 1270px) {
				:root {--mg:1.1vw; --fn1:2vw; --fn2:2.5vw;}
				main {grid-template-columns:50% 50%}
				#nav, fieldset > h2 {display:none}
				#signOut1 {visibility:hidden}
				#listSide {display:block; text-align:left;}
				#list {border-left:0}
				#nav {border-right: 1px solid var(--brC);}
				#navField {display:grid}
			}
			@media screen and (max-width: 1000px) and (orientation: portrait) {
				:root {--mg:3.2vw; --fn1:6vw; --fn2:7vw;}
				main, #backDiv {display:block}
				#nav, #detail, #signOutDiv {display:none}
				#signOut1 {visibility:visible}
				section:nth-child(2) {border-right:0}
				#detailDiv {text-align:right}
				#nav {border-right: none;}
			}
			@media screen and (max-width: 1000px) and (orientation: landscape) {
				:root {--mg:1vw; --fn1:2vw; --fn2:2.5vw;}
			}
		</style>
	</head>
	<body>
		<main>
			<section id="nav">
				<fieldset id="navField">
					<div>
						<svg viewbox="0 0 100 100" class="sideBut">
							<polygon points="10,90 90,90 90,10 10,10" />
							<polygon points="40,90 40,10" />
							<polygon points="18,20 32,20" />
							<polygon points="18,30 32,30" />
							<polygon points="18,40 32,40" />
						</svg>
					</div>
					<div>
						<svg viewbox="0 0 100 100" id="signOut1">
							<polygon points="10,10 10,90" />
							<polygon points="10,90 60,90" />
							<polygon points="60,90 60,70" />
							<polygon points="60,30 60,10" /><polygon points="60,10 10,10" />
							<polygon points="30,50 97,50" /><polygon points="83,35 97,50" />
							<polygon points="83,65 97,50" />
						</svg>
					</div>
				</fieldset>
				<div>
					<form action="" method="post" class="listView">
						<input id="n1" name="nav" type="radio" value="1" checked>
						<label for="n1">1</label>
						<input id="n2" name="nav" type="radio" value="2">
						<label for="n2">2</label>
						<input id="n3" name="nav" type="radio" value="3">
						<label for="n3">3</label>
						<input id="n4" name="nav" type="radio" value="4">
						<label for="n4">4</label>
					</form>
				</div>
			</section>
			<section id="list">
				<fieldset>
					<h2>Stock</h2>
					<div id="listSide">
						<svg viewbox="0 0 100 100" class="sideBut">
							<polygon points="10,90 90,90 90,10 10,10" />
							<polygon points="40,90 40,10" />
							<polygon points="18,20 32,20" />
							<polygon points="18,30 32,30" />
							<polygon points="18,40 32,40" />
						</svg>
					</div>
					<div>
						<svg viewbox="0 0 100 100" id="compose">
							<circle cx="50" cy="50" r="40" />
							<polygon points="50,25 50,75" />
							<polygon points="25,50 75,50" />
						</svg>
						<svg viewbox="0 0 100 100" id="tiles">
							<polygon points="10,10 40,10 40,40 10,40" />
							<polygon points="60,10 90,10 90,40 60,40" />
							<polygon points="10,60 40,60 40,90 10,90" />
							<polygon points="60,60 90,60 90,90 60,90" />
						</svg>
					</div>
				</fieldset>
				<div>
					<form action="" method="post" class="listView">
						<input id="l1" name="list" type="radio" value="1" checked autofocus>
						<label for="l1">1</label>
						<input id="l2" name="list" type="radio" value="2">
						<label for="l2">2</label>
						<input id="l3" name="list" type="radio" value="3">
						<label for="l3">3</label>
						<input id="l4" name="list" type="radio" value="4">
						<label for="l4">4</label>
					</form>
				</div>
			</section>
			<section id="detail">
				<fieldset>
					<div id="backDiv">
						<svg viewbox="0 0 100 100" id="backButton">
							<polygon points="50,10 10,50" /><polygon points="10,50 50,90" /><polygon points="10,50 90,50" />
						</svg>
					</div>
					<div id="detailDiv">
						<svg viewbox="0 0 100 100" id="delButton">
							<polygon points="33,10 68,10 68,20 33,20" />
							<polygon points="20,20 80,20 75,90 25,90" />
							<polygon points="10,20 90,20" /><polygon points="33,30 39,80" /><polygon points="50,30 50,80" /><polygon points="67,30 62,80" />
						</svg>
						<svg viewbox="0 0 100 100" id="saveButton">
							<polygon points="10,90 90,90 90,25 75,10 10,10" /><polygon points="30,10 30,35 70,35 70,10" /><polygon points="20,90 20,50 80,50 80,90" /><polygon points="59,17 62,17 62,28 59,28" />
						</svg>
					</div>
					<div id="signOutDiv">
						<svg viewbox="0 0 100 100" id="signOut2">
							<polygon points="10,10 10,90" />
							<polygon points="10,90 60,90" />
							<polygon points="60,90 60,70" />
							<polygon points="60,30 60,10" /><polygon points="60,10 10,10" />
							<polygon points="30,50 97,50" /><polygon points="83,35 97,50" />
							<polygon points="83,65 97,50" />
						</svg>
					</div>
				</fieldset>
				<div>
					<form action="" method="post" class="listView">
						<input id="c1" name="copy" type="radio" value="1" checked>
						<label for="c1">1</label>
						<input id="c2" name="copy" type="radio" value="2">
						<label for="c2">2</label>
						<input id="c3" name="copy" type="radio" value="3">
						<label for="c3">3</label>
						<input id="c4" name="copy" type="radio" value="4">
						<label for="c4">4</label>
					</form>
				</div>
			</section>
		</main>
		<script>
			const $ = selector => {return document.querySelectorAll(selector)};
			if(window.matchMedia("(max-width: 1270px)").matches) {
				[...$('.sideBut')].forEach(but=>{
					but.addEventListener('click',()=>{
						const isBlock = $('#nav')[0].style.display != "block";
						$('#list')[0].style.display = isBlock?"none":"block";
						$('#nav')[0].style.display = isBlock?"block":"none";
					});
				});
			}
		</script>
	</body>
</html>
