<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Sona</title>
		<link rel="icon" href="data:,">
		<meta content="Starfid Sona" name="description">
		<meta content="notranslate" name="google">
		<meta content="yes" name="mobile-web-app-capable">
		<meta content="yes" name="apple-mobile-web-app-capable">
		<meta content="default" name="apple-mobile-web-app-status-bar-style">
		<meta content="#FFFFFF" name="theme-color" media="(prefers-color-scheme: light)">
		<meta content="#1E1E1E" name="theme-color" media="(prefers-color-scheme: dark)">
		<meta content="width=device-width,initial-scale=1,maximum-scale=1,shrink-to-fit=no,user-scalable=0,viewport-fit=cover" name="viewport">
		<style>
			:root {
				--bg:#FFFFFF;	--fn2:1.7vw;	--brC:#FAF9F7; 			--bghg:#0069DB;	--hgit:#C7D8EA;
				--mg:.7vw;	--fn1:1.1vw;	--mg2:calc(var(--fn2) / 2);	--bgbl:#EFEEED;	--cl:#000000;
				--wh:#FFFFFF;
			}
			body {background-color:var(--bg); font-family:Arial; font-size:var(--fn1); color:var(--cl)}
			body, fieldset, form, form input {margin:0; padding:0}
			svg {cursor:pointer}
			main {display:grid; grid-template-columns:22% auto 39%;}
			section {position:relative; height:100vh; overflow:hidden;}
			section:nth-child(2) {border-left:1px solid var(--brC); border-right:1px solid var(--brC)}
			fieldset {
				position:absolute; top:0; left:0; right:0; z-index:1;
				border:0; display:grid; grid-template-columns:50% 50%
			}
			fieldset div:not(:first-child) {text-align:right;}
			fieldset > h2, fieldset > div {font-size:var(--fn2); font-weight:bolder}
			fieldset > h2 {padding:0;margin:var(--mg) var(--mg) var(--mg) calc(var(--mg) + (var(--fn2) / 2))}
			fieldset > div {margin:var(--mg);}
			section > div {margin:0 var(--mg) 0 var(--mg);}
			section > div {
				position:absolute; top:0; left:0; right:0; bottom:0; overflow-y:auto;
				scrollbar-width:none; padding-top: calc(((3 * var(--mg)) + var(--fn2)) * .91);
			}
			svg:first-child {margin-left:var(--mg2)}
			svg:last-child {margin-right:var(--mg2)}
			svg {
				width:calc(var(--fn2)); height:100%; stroke-width:4; stroke:#000;fill:transparent;
				margin: 0 0 0 var(--mg2);
			}
			#listSide, #backDiv, #navField {display:none}
			#detailDiv {text-align:left}
			.listView input[type='radio'] {position: absolute;left: -9999px;}
			.listView label {
				display:block;cursor:pointer;
				height:7vh; padding:calc(var(--fn2) / 2); border-radius:1vh
			}
			.listView input[type="radio"]:checked + label {background:var(--bgbl);color:var(--cl)}
			.listView input[type="radio"]:checked:focus + label {animation: highlight 1s forwards;color:var(--wh)}

			@keyframes highlight {from {background-color:var(--hgit)} to {background-color:var(--bghg)}}

			@media screen and (max-width: 1175px) {
				:root {--mg:1.1vw; --fn1:2vw; --fn2:2.5vw;}
				main {grid-template-columns:50% 50%}
				#nav, fieldset > h2 {display:none}
				#signOut1 {visibility:hidden}
				#listSide {display:block; text-align:left;}
				#list {border-left:0}
				#nav {border-right: 1px solid var(--brC);}
				#navField {display:grid}
			}
			@media screen and (max-width: 500px) and (orientation: portrait) {
				:root {--mg:3.2vw; --fn1:6vw; --fn2:7vw;}
				main, #backDiv {display:block}
				#nav, #detail, #signOutDiv {display:none}
				#signOut1 {visibility:visible}
				section:nth-child(2) {border-right:0}
				#detailDiv {text-align:right}
				#nav {border-right: none;}
			}
			@media screen and (max-width: 500px) and (orientation: landscape) {
				:root {--mg:1vw; --fn1:2vw; --fn2:2.5vw;}
			}
		</style>
	</head>
	<body>
		<main>
			<section id="nav">
				<fieldset id="navField">
					<div>
						<svg viewbox="0 0 100 100" class="sideBut">
							<path d="M10 90 H90 V10 H10 Z M40 90 V10 M18 20 H32 M18 30 H32 M18 40 H32" />
						</svg>
					</div>
					<div>
						<svg viewbox="0 0 100 100" id="signOut1">
							<path d="M10 10 H60 V30 M60 70 V90 H10 V7.5" />
							<path d="M30 50 H97 M83 35 L97 50 L83 65" />
						</svg>
					</div>
				</fieldset>
				<div>
					<form action="" method="post" class="listView">
						<input id="n1" name="nav" type="radio" value="1" checked><label for="n1">1</label>
						<input id="n2" name="nav" type="radio" value="2"><label for="n2">2</label>
						<input id="n3" name="nav" type="radio" value="3"><label for="n3">3</label>
						<input id="n4" name="nav" type="radio" value="4"><label for="n4">4</label>
					</form>
				</div>
			</section>
			<section id="list">
				<fieldset>
					<h2>Stock</h2>
					<div id="listSide">
						<svg viewbox="0 0 100 100" class="sideBut">
							<path d="M10 90 H90 V10 H10 Z M40 90 V10 M18 20 H32 M18 30 H32 M18 40 H32" />
						</svg>
					</div>
					<div>
						<svg viewbox="0 0 100 100" id="compose">
							<path d="M50 10 A40 40 0 1 1 50 90 A40 40 0 1 1 50 10 M50 25 V75 M25 50 H75" />
						</svg>
						<svg viewbox="0 0 100 100" id="tiles">
							<path d="M10 10 H40 V40 H10 Z M60 10 H90 V40 H60 Z M10 60 H40 V90 H10 Z M60 60 H90 V90 H60 Z" />
						</svg>
					</div>
				</fieldset>
				<div>
					<form action="" method="post" class="listView">
						<input id="l1" name="list" type="radio" value="1" checked autofocus><label for="l1">1</label>
						<input id="l2" name="list" type="radio" value="2"><label for="l2">2</label>
						<input id="l3" name="list" type="radio" value="3"><label for="l3">3</label>
						<input id="l4" name="list" type="radio" value="4"><label for="l4">4</label>
					</form>
				</div>
			</section>
			<section id="detail">
				<fieldset>
					<div id="backDiv">
						<svg viewbox="0 0 100 100" id="backButton">
							<path d="M50,10 L10,50 L50,90 M10,50 L90,50" />
						</svg>
					</div>
					<div id="detailDiv">
						<svg viewbox="0 0 100 100" id="delButton">
							<path d="M33 10 H68 V20 H33 Z M20 20 H80 L75 90 H25 Z M10 20 H90 M33 30 L39 80 M50 30 V80 M67 30 L62 80" />
						</svg>
						<svg viewbox="0 0 100 100" id="saveButton">
							<path d="M10,90 H90 V25 L75,10 H10Z M30,10 V35 H70 V10Z M20,90 V50 H80 V90Z M59,17 h3 v11 h-3Z" />
						</svg>
					</div>
					<div id="signOutDiv">
						<svg viewbox="0 0 100 100" id="signOut2">
							<path d="M10 10 H60 V30 M60 70 V90 H10 V7.5" />
							<path d="M30 50 H97 M83 35 L97 50 L83 65" />
						</svg>
					</div>
				</fieldset>
				<div>
					<form action="" method="post" class="listView">
						<input id="d1" name="detail" type="radio" value="1" checked><label for="d1">1</label>
						<input id="d2" name="detail" type="radio" value="2"><label for="d2">2</label>
						<input id="d3" name="detail" type="radio" value="3"><label for="d3">3</label>
						<input id="d4" name="detail" type="radio" value="4"><label for="d4">4</label>
					</form>
				</div>
			</section>
		</main>
		<script>
			const $$ = s => {return document.querySelectorAll(s)};
			const $ = s => {return document.querySelector(s)};
			const selList = el => console.log(el);

			if(window.matchMedia('screen and (max-width: 1175px)').matches) {
				const swap = (src, first, second) => {
					const isBlock = $(src).style.display !== 'block';
					$(first).style.display = isBlock ? 'none' : 'block';
					$(second).style.display = isBlock ? 'block' : 'none';
				};
				const swapNav = () => swap('#nav', '#list', '#nav');
				const swapDetail = () => swap('#detail', '#list', '#detail');

				$$('.sideBut').forEach(but => but.addEventListener('click', swapNav));
				if(window.matchMedia('screen and (max-width: 500px) and (orientation: portrait)').matches) {
					$$('#list form > label, #backDiv').forEach(lbl => lbl.addEventListener('click', ()=>{
						swapDetail();
						if (lbl.nodeName === 'LABEL') selList(lbl.previousSibling);
					}));
				}
			}
			if(window.matchMedia('screen and (min-width: 500px)').matches) {
				const keyboard = {
					ArrowLeft:{detail:'#list',list:'#nav'},
					ArrowRight:{nav:'#list',list:'#detail'}
				};
				[...$$('form > input[type=radio]')].forEach(inp=>{
					inp.addEventListener('keydown',(e)=>{
						const sect = keyboard[e.key]?.[inp.name];
						if(sect) {
							$(sect + ' form > input[type=radio]:checked')?.focus();
							e.preventDefault();
						}
					});
					if (inp.name === 'list') inp.addEventListener('click', () => selList(inp));
				});
			}
		</script>
	</body>
</html>
